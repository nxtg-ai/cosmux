name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux (runtime dep for integration paths)
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --release --locked

      - name: Test
        run: cargo test --all-features --locked

      - name: Smoke test — validate sample pod
        run: |
          mkdir -p test-pods
          cat > test-pods/smoke.yaml <<'EOF'
          name: smoke
          root: "/tmp"
          windows:
            - name: w
              panes:
                - cwd: "/tmp"
                  command: "echo hello"
          EOF
          ./target/release/cosmux validate test-pods/smoke.yaml
